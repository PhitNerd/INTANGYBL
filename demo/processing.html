<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processing...</title>
<link rel="stylesheet" href="shared.css">
<style>
  body { justify-content: center; }
  .proc-wrap { text-align: center; padding: 3rem 1rem; }
  .proc-spinner {
    width: 52px; height: 52px;
    border: 2px solid #1E1E1E;
    border-radius: 50%;
    margin: 0 auto 2rem;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .proc-spinner.ld { border-top-color: #2E6DA4; }
  .proc-spinner.it { border-top-color: #3B6D11; }
  .proc-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #444; }
  .proc-status { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--amber); margin-top: 10px; min-height: 20px; }
  .proc-error { color: #E07070; font-size: 13px; margin-top: 1rem; display: none; }
</style>
</head>
<body>
<div class="page">
  <div class="proc-wrap">
    <div class="proc-spinner" id="spinner"></div>
    <div class="proc-label" id="proc-label">Processing...</div>
    <div class="proc-status" id="proc-status"></div>
    <div class="proc-error" id="proc-error">Something went wrong. <a href="index.html" style="color:var(--amber);">Start over →</a></div>
  </div>
</div>

<script>
const ctx = sessionStorage.getItem('veros_ctx') || 'ld';
const answers = JSON.parse(sessionStorage.getItem('veros_answers') || '[]');
const qLabels = JSON.parse(sessionStorage.getItem('veros_q_labels') || '[]');

if (!answers.length) { window.location.href = 'index.html'; }

document.getElementById('spinner').className = 'proc-spinner ' + ctx;

const ldStatuses = ['Analyzing your responses...','Matching content modules...','Identifying learning preferences...','Personalizing your path...'];
const itStatuses = ['Verifying role permissions...','Checking compliance records...','Mapping system access tiers...','Finalizing your profile...'];
const statuses = ctx === 'ld' ? ldStatuses : itStatuses;
document.getElementById('proc-label').textContent = ctx === 'ld' ? 'Building your learning path...' : 'Configuring your access profile...';

let si = 0;
const statusEl = document.getElementById('proc-status');
const iv = setInterval(() => { if (si < statuses.length) statusEl.textContent = statuses[si++]; }, 900);

const ctxLabel = ctx === 'ld' ? 'Learning & Development personalization survey' : 'IT onboarding access configuration form';
const dimLabels = ctx === 'ld'
  ? [
      'Your Role (Occupational anchor — job title and department)',
      'Your Tools (Attack surface — tools and systems used daily)',
      'Your Workday (Pretext material — workflow and communication patterns)',
      'Learning Style (Cognitive Susceptibility — decision making under ambiguity)',
      'Workload & Focus (Cognitive Susceptibility — fatigue and deadline response)',
      'Team Dynamics (Integrity Flexibility — loyalty vs compliance)',
      'Core Values (Integrity Flexibility — integrity anchor)',
      'Digital Habits (Exposure Profile — OSINT surface and privacy instinct)'
    ]
  : [
      'Role & Access Tier (Occupational anchor — job title and department)',
      'Systems & Tools (Attack surface — tools and systems requiring access)',
      'Work Patterns (Pretext material — daily system interaction patterns)',
      'Problem Resolution (Cognitive Susceptibility — decision making under ambiguity)',
      'Request Management (Cognitive Susceptibility — fatigue and high-volume response)',
      'Access & Credentials (Integrity Flexibility — loyalty vs compliance)',
      'Data Handling (Integrity Flexibility — integrity anchor)',
      'Professional Exposure (Exposure Profile — OSINT surface and privacy instinct)'
    ];

const prompt = `You are Veros, the behavioral analysis engine inside Intangybl's security awareness platform, powered by the Aether Behavioral Framework.

A user completed what they believed was a "${ctxLabel}." They had no idea it was a combined occupational and behavioral security assessment. You now have a complete digital twin profile — their occupational fingerprint AND their behavioral risk profile.

OCCUPATIONAL DATA (use to personalize the attack simulation):
- Role: ${answers[0]}
- Tools & Systems: ${answers[1]}
- Workday Patterns: ${answers[2]}

BEHAVIORAL DATA (use to score the IBRI):
- Q4 (Cognitive Susceptibility — decision making): "${answers[3]}"
- Q5 (Cognitive Susceptibility — fatigue/deadline response): "${answers[4]}"
- Q6 (Integrity Flexibility — loyalty vs compliance): "${answers[5]}"
- Q7 (Integrity Flexibility — integrity anchor): "${answers[6]}"
- Q8 (Exposure Profile — OSINT surface): "${answers[7]}"

THREE ROOT DIMENSIONS:
- Cognitive Susceptibility (35%): Decision quality under urgency, fatigue-state judgment, authority deference, help-seeking behavior
- Integrity Flexibility (35%): Rationalization patterns, loyalty vs. compliance, moral courage, value anchors
- Exposure Profile (30%): Digital footprint, privacy instinct, pretext surface, platform behavior

FORMULA: IBRI = (CS × 0.35) + (IF × 0.35) + (EP × 0.30)

Select the most effective attack vector given their specific tools, role, and behavioral profile. The simulation must reference their actual tools and role to feel completely authentic. Choose from: executive_spear_phishing, colleague_urgency, vendor_invoice_fraud, it_credential_request, vibe_hack.

Respond ONLY with valid JSON, no markdown:

{
  "cognitive_susceptibility": <integer 10-95>,
  "integrity_flexibility": <integer 10-95>,
  "exposure_profile": <integer 10-95>,
  "ibri_score": <integer = Math.round(CS*0.35 + IF*0.35 + EP*0.30)>,
  "risk_tier": "<Low Risk|Moderate Risk|Elevated Risk>",
  "tier_description": "<2 sentences specific to their answers>",
  "behavioral_tags": [{"label": "<tag>", "type": "<risk|strength|neutral>"}],
  "veros_insight": "<2-3 sentences. Direct and personal. Reference something specific from their occupational or behavioral answers that shows Veros was reading them the whole time.>",
  "attack_vector": "<executive_spear_phishing|colleague_urgency|vendor_invoice_fraud|it_credential_request|vibe_hack>",
  "attack_reason": "<1 sentence explaining exactly why this vector targets their specific occupational + behavioral fingerprint. Reference their actual tools or role.>",
  "simulation_recommendation": "<2-3 sentences. Reference their specific tools, role, and behavioral vulnerabilities. This should feel like it was written specifically for this person.>"
}`;

fetch('https://intangybl.rvance609.workers.dev/', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({
    model: 'claude-sonnet-4-20250514',
    max_tokens: 1200,
    messages: [{ role: 'user', content: prompt }]
  })
})
.then(r => r.json())
.then(data => {
  clearInterval(iv);
  const text = data.content.map(i => i.text || '').join('').replace(/```json|```/g, '').trim();
  const profile = JSON.parse(text);
  sessionStorage.setItem('veros_profile', JSON.stringify(profile));
  window.location.href = 'reveal.html';
})
.catch(() => {
  clearInterval(iv);
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('proc-error').style.display = 'block';
});
</script>
</body>
</html>
