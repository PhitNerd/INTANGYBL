<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veros — The Reveal</title>
<link rel="stylesheet" href="shared.css">
<style>
  body { justify-content: center; }
  .reveal-wrap { text-align: center; max-width: 520px; margin: 0 auto; padding: 2rem 0; }
  .reveal-pre {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #444;
    letter-spacing: 1px;
    margin-bottom: 1.25rem;
    font-style: italic;
  }
  .reveal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 38px;
    line-height: 1.2;
    color: #F0EDE8;
    margin-bottom: 0.75rem;
  }
  .reveal-title span { color: var(--amber); }
  .reveal-rule { width: 48px; height: 2px; background: var(--amber); margin: 1.25rem auto; }
  .reveal-sub {
    font-size: 14px;
    color: #666;
    line-height: 1.7;
    margin-bottom: 2.5rem;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }
  .reveal-context-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-radius: 40px;
    padding: 5px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    margin-bottom: 2rem;
    border: 0.5px solid;
  }
  .reveal-context-badge.ld { background: #0D1F2E; color: #2E6DA4; border-color: #2E6DA4; }
  .reveal-context-badge.it { background: #0F1F0F; color: #3B6D11; border-color: #3B6D11; }
</style>
</head>
<body>
<div class="page fade-in">
  <div class="reveal-wrap">
    <div class="reveal-pre" id="reveal-pre"></div>
    <div class="reveal-title">That was <span>Veros.</span></div>
    <div class="reveal-rule"></div>
    <div class="reveal-context-badge" id="ctx-badge"></div>
    <div class="reveal-sub">You just completed a behavioral security assessment without knowing it. Your answers were analyzed in real time across three root dimensions of human risk.</div>
    <a href="profile.html" class="btn-primary">See what Veros knows about you →</a>
  </div>
</div>

<script>
const ctx = sessionStorage.getItem('veros_ctx') || 'ld';
const pre = ctx === 'ld' ? "That wasn't a learning path survey." : "That wasn't an IT onboarding form.";
const badge = ctx === 'ld' ? 'Entered via: People & Development' : 'Entered via: Information Technology';
document.getElementById('reveal-pre').textContent = pre;
const b = document.getElementById('ctx-badge');
b.className = 'reveal-context-badge ' + ctx;
b.textContent = badge;
</script>
</body>
</html>
